[package]
name = "markman"
version = "0.0.2"
description = "A Notion-style markdown document viewer with 3D page-flip animation"
authors = ["nhnpro"]
edition = "2021"

[lib]
name = "markman_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["time"] }
tauri-plugin-dialog = "2.6.0"
